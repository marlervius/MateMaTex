services:
  - type: web
    name: matematex-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MATE_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DEFAULT_MODEL
        sync: false
      - key: PRIMARY_MODEL
        sync: false
      - key: FALLBACK_MODEL
        sync: false
      - key: OUTPUT_DIR
        value: /tmp/matematex_out
      - key: ENVIRONMENT
        value: production
